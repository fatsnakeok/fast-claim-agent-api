spring:
  application:
    name: fast-claim-agent-api-test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

server:
  port: 0

embabel:
  models:
    default-llm: deepseek-chat
    llms:
      fast: deepseek-chat
      balanced: deepseek-chat
      powerful: deepseek-reasoner
      best: deepseek-reasoner
  agent:
    platform:
      models:
        deepseek:
          api-key: ${DEEPSEEK_API_KEY:sk-test-placeholder-for-integration-tests}
          timeout: 120s
          max-retries: 3
          connect-timeout: 30s
          read-timeout: 120s

claim:
  rag:
    documents-path: classpath:documents/
    documents: claims_guide.md,faq.md
    auto-ingest: false
    lucene:
      name: claim-lucene
      chunk-size: 1000
      chunk-overlap: 200

logging:
  level:
    com.fastclaim: DEBUG
    com.embabel.agent: DEBUG
